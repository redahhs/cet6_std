<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>CET6 Immersive</title>
  <style>
    :root {
      --bg: #0a0a0a; --card-bg: rgba(28,28,30,0.65); --border: rgba(255,255,255,0.08);
      --text-main: #f5f5f7; --text-sub: #86868b; --accent: #5e5ce6;
    }
    body { background: var(--bg); color: var(--text-main); font-family: -apple-system, sans-serif; margin: 0; min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .glass { background: var(--card-bg); backdrop-filter: blur(24px); border: 1px solid var(--border); border-radius: 24px; }
    .text-gradient { background: linear-gradient(135deg, #fff, #a1a1aa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-sub); text-decoration: none; }
    .nav-item.active { color: var(--accent); }
  </style>
</head>
<body>
  <div style="position:fixed;top:-20%;right:-20%;width:80vw;height:80vw;background:radial-gradient(circle,rgba(94,92,230,0.15),transparent 70%);filter:blur(80px);z-index:0;"></div>
  
  <main style="position:relative;z-index:1;max-width:600px;margin:0 auto;padding:60px 24px 120px;">
    <header style="margin-bottom:40px;">
      <p id="date-text" style="font-size:12px;color:var(--text-sub);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;">Loading...</p>
      <h1 class="text-gradient" style="font-size:32px;margin:0;">Ready to focus?</h1>
    </header>

    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:24px;">
      <div class="glass" style="padding:20px;">
        <p style="font-size:11px;color:var(--text-sub);text-transform:uppercase;margin:0 0 8px;">Streak</p>
        <p style="font-size:28px;font-weight:700;margin:0;"><span id="stat-streak">12</span> <span style="font-size:12px;color:var(--accent);">days</span></p>
      </div>
      <div class="glass" style="padding:20px;">
        <p style="font-size:11px;color:var(--text-sub);text-transform:uppercase;margin:0 0 8px;">Words</p>
        <p style="font-size:28px;font-weight:700;margin:0;"><span id="stat-words">847</span></p>
      </div>
    </div>

    <div class="glass" style="padding:24px;margin-bottom:24px;" onclick="location.href='./vocab.html'">
      <p style="font-size:11px;color:var(--accent);text-transform:uppercase;margin:0 0 16px;">Daily Inspiration</p>
      <p style="font-size:22px;font-weight:500;margin:0 0 8px;">"The only way to do great work is to love what you do."</p>
      <p style="font-size:14px;color:var(--text-sub);margin:0;">— Steve Jobs</p>
    </div>

    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px;">
      <a href="./vocab.html" class="glass" style="padding:20px;text-decoration:none;color:var(--text-main);">
        <div style="width:40px;height:40px;border-radius:12px;background:rgba(94,92,230,0.1);display:flex;align-items:center;justify-content:center;color:var(--accent);margin-bottom:12px;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
        </div>
        <p style="font-size:16px;font-weight:600;margin:0 0 4px;">Vocabulary</p>
        <p style="font-size:12px;color:var(--text-sub);margin:0;">Swipe & Learn</p>
      </a>
      <a href="./reading.html" class="glass" style="padding:20px;text-decoration:none;color:var(--text-main);">
        <div style="width:40px;height:40px;border-radius:12px;background:rgba(34,197,94,0.1);display:flex;align-items:center;justify-content:center;color:#22c55e;margin-bottom:12px;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
        </div>
        <p style="font-size:16px;font-weight:600;margin:0 0 4px;">Reading</p>
        <p style="font-size:12px;color:var(--text-sub);margin:0;">Deep Dive</p>
      </a>
    </div>
  </main>

  <nav class="glass" style="position:fixed;bottom:0;left:0;right:0;border-radius:0;border-top:1px solid var(--border);padding:12px 24px;display:flex;justify-content:space-around;z-index:50;">
    <a href="./index.html" class="nav-item active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      <span>Home</span>
    </a>
    <a href="./vocab.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
      <span>Vocab</span>
    </a>
    <a href="./reading.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
      <span>Read</span>
    </a>
    <a href="./notebook.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
      <span>Saved</span>
    </a>
  </nav>

  <script src="./js/storage.js"></script>
  <script src="./js/index.js"></script>
</body>
</html>
