<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>CET6 Immersive</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/theme.css">
</head>
<body>
  <!-- SPA Root -->
  <main id="app" class="flex-1 flex flex-col"></main>

  <!-- Global Bottom Navigation -->
  <nav class="fixed bottom-0 left-0 right-0 glass-card !rounded-none !border-t !border-x-0 !border-b-0 px-6 py-3 flex justify-around items-center z-50" style="padding-bottom: max(12px, var(--safe-bottom));">
    <a href="/" class="nav-link flex flex-col items-center gap-1 text-[var(--accent)]">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
      <span class="text-[10px] font-medium">Home</span>
    </a>
    <a href="/vocab" class="nav-link flex flex-col items-center gap-1 text-[var(--text-secondary)]">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
      <span class="text-[10px] font-medium">Vocab</span>
    </a>
  </nav>

  <!-- Scripts -->
  <script src="js/store.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/router.js"></script>
  <script src="js/pages/vocab.js"></script>
  
  <script>
    // Simple Home Page Component
    class HomePage {
      constructor(root) { this.root = root; }
      mount() {
        this.root.innerHTML = `
          <div class="px-6 pt-14 pb-6">
            <h1 class="text-3xl font-bold mb-8">Ready to focus?</h1>
            <button id="btn-start" class="w-full py-4 bg-[var(--accent)] text-white rounded-xl font-semibold text-lg">Continue Vocabulary</button>
          </div>
        `;
        document.getElementById('btn-start').addEventListener('click', () => window.router.navigate('/vocab'));
      }
      unmount() {}
    }

    // Initialize Router
    window.router = new Router([
      { path: '/', component: HomePage },
      { path: '/vocab', component: VocabPage }
    ]);
    window.router.resolve();
  </script>
</body>
</html>
