<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#050505">
  <meta name="mobile-web-app-capable" content="yes">
  <title>CET6 Immersive</title>
  <link rel="stylesheet" href="./css/theme.css">
  <link rel="stylesheet" href="./css/utilities.css">
  <style>
    /* =========================================
       Deep Focus Dashboard - Pure CSS Engine
       ========================================= */
    :root {
      --bg-main: #050505;
      --bg-card: rgba(28, 28, 30, 0.65);
      --border-subtle: rgba(255, 255, 255, 0.08);
      --text-main: #f5f5f7;
      --text-sub: #86868b;
      --accent: #5e5ce6;
      --accent-glow: rgba(94, 92, 230, 0.15);
    }

    body {
      background: var(--bg-main);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "PingFang SC", sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* 背景光晕 */
    .glow-orb {
      position: fixed;
      top: -20%;
      right: -20%;
      width: 80vw;
      height: 80vw;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      animation: orbFloat 15s ease-in-out infinite alternate;
    }
    @keyframes orbFloat {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-30px, 40px) scale(1.1); }
    }

    /* 玻璃拟态卡片 */
    .glass-card {
      background: var(--bg-card);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid var(--border-subtle);
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    /* 数据面板 */
    .stat-value {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    /* 衬线体 (用于每日一句) */
    .serif {
      font-family: "New York", "Playfair Display", "Noto Serif SC", serif;
      letter-spacing: -0.01em;
    }

    /* 导航网格微交互 */
    .nav-item {
      transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1), background 0.2s;
    }
    .nav-item:active {
      transform: scale(0.96);
      background: rgba(255, 255, 255, 0.08);
    }

    /* 底部导航栏 */
    .bottom-nav {
      background: rgba(20, 20, 20, 0.85);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-top: 1px solid var(--border-subtle);
    }
    .nav-link {
      color: var(--text-sub);
      transition: color 0.2s;
    }
    .nav-link.active {
      color: var(--accent);
    }

    /* 骨架屏闪烁 */
    .skeleton-text {
      background: linear-gradient(90deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite linear;
      border-radius: 8px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>
  <div class="glow-orb"></div>

  <main class="relative z-10 px-6 pt-14 pb-32 max-w-xl mx-auto">
    <!-- Header -->
    <header class="mb-10">
      <p class="text-xs font-semibold tracking-widest text-[var(--text-sub)] uppercase mb-2" id="date-text">Loading...</p>
      <h1 class="text-4xl font-bold tracking-tight" id="greeting-text">Ready to focus?</h1>
    </header>

    <!-- Stats Grid -->
    <section class="grid grid-cols-3 gap-4 mb-8">
      <div class="glass-card p-5 flex flex-col justify-between min-h-[110px]">
        <span class="text-[10px] font-bold tracking-wider text-[var(--text-sub)] uppercase">Streak</span>
        <div class="flex items-baseline gap-1">
          <span class="stat-value" id="stat-streak">0</span>
          <span class="text-xs text-[var(--accent)]">days</span>
        </div>
      </div>
      <div class="glass-card p-5 flex flex-col justify-between min-h-[110px]">
        <span class="text-[10px] font-bold tracking-wider text-[var(--text-sub)] uppercase">Mastered</span>
        <div class="flex items-baseline gap-1">
          <span class="stat-value" id="stat-mastered">0</span>
        </div>
      </div>
      <div class="glass-card p-5 flex flex-col justify-between min-h-[110px]">
        <span class="text-[10px] font-bold tracking-wider text-[var(--text-sub)] uppercase">Fuzzy</span>
        <div class="flex items-baseline gap-1">
          <span class="stat-value text-yellow-500" id="stat-fuzzy">0</span>
        </div>
      </div>
    </section>

    <!-- Daily Quote -->
    <section class="glass-card p-8 mb-8 relative overflow-hidden" id="quote-card">
      <span class="text-[10px] font-bold tracking-widest text-[var(--accent)] uppercase mb-4 block">Daily Inspiration</span>
      <p class="serif text-2xl leading-snug text-[var(--text-main)] mb-4" id="quote-en">"The only way to do great work is to love what you do."</p>
      <p class="text-sm text-[var(--text-sub)]" id="quote-zh">— Steve Jobs</p>
    </section>

    <!-- Navigation Grid -->
    <section class="grid grid-cols-2 gap-4 mb-8">
      <a href="./vocab.html" class="nav-item glass-card p-6 flex flex-col gap-4">
        <div class="w-10 h-10 rounded-xl bg-[var(--accent)]/10 flex items-center justify-center text-[var(--accent)]">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
        </div>
        <div>
          <h3 class="text-base font-semibold">Vocabulary</h3>
          <p class="text-xs text-[var(--text-sub)] mt-1">Swipe & Learn</p>
        </div>
      </a>
      <a href="./quote.html" class="nav-item glass-card p-6 flex flex-col gap-4">
        <div class="w-10 h-10 rounded-xl bg-purple-500/10 flex items-center justify-center text-purple-400">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21v-4a4 4 0 1 1 4 4h-4z"></path><path d="M21 3v4a4 4 0 1 1-4-4h4z"></path></svg>
        </div>
        <div>
          <h3 class="text-base font-semibold">Quotes</h3>
          <p class="text-xs text-[var(--text-sub)] mt-1">Inspiration</p>
        </div>
      </a>
      <a href="./reading.html" class="nav-item glass-card p-6 flex flex-col gap-4">
        <div class="w-10 h-10 rounded-xl bg-emerald-500/10 flex items-center justify-center text-emerald-400">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
        </div>
        <div>
          <h3 class="text-base font-semibold">Reading</h3>
          <p class="text-xs text-[var(--text-sub)] mt-1">Deep Dive</p>
        </div>
      </a>
      <a href="./notebook.html" class="nav-item glass-card p-6 flex flex-col gap-4">
        <div class="w-10 h-10 rounded-xl bg-rose-500/10 flex items-center justify-center text-rose-400">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
        </div>
        <div>
          <h3 class="text-base font-semibold">Notebook</h3>
          <p class="text-xs text-[var(--text-sub)] mt-1">Saved Items</p>
        </div>
      </a>
    </section>
  </main>

  <!-- Bottom Nav -->
  <nav class="bottom-nav fixed bottom-0 left-0 right-0 px-6 py-3 flex justify-around items-center z-50" style="padding-bottom: max(12px, env(safe-area-inset-bottom));">
    <a href="./index.html" class="nav-link active flex flex-col items-center gap-1">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      <span class="text-[10px] font-medium">Home</span>
    </a>
    <a href="./vocab.html" class="nav-link flex flex-col items-center gap-1">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
      <span class="text-[10px] font-medium">Vocab</span>
    </a>
    <a href="./reading.html" class="nav-link flex flex-col items-center gap-1">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
      <span class="text-[10px] font-medium">Read</span>
    </a>
    <a href="./notebook.html" class="nav-link flex flex-col items-center gap-1">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
      <span class="text-[10px] font-medium">Saved</span>
    </a>
  </nav>

  <script src="./js/storage.js"></script>
  <script src="./js/app.js"></script>
  <script src="./js/index.js"></script>
</body>
</html>
