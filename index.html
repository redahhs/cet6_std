<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>CET6 Immersive</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --card: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.08);
      --text-main: #f5f5f7;
      --text-sub: #86868b;
      --accent: #5e5ce6;
    }
    body { background: var(--bg); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", sans-serif; margin: 0; padding-bottom: 100px; min-height: 100vh; }
    
    /* Background Glow */
    .glow { position: fixed; top: -20%; right: -20%; width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(94, 92, 230, 0.15) 0%, transparent 70%); filter: blur(60px); pointer-events: none; z-index: 0; }

    /* Layout */
    .container { max-width: 600px; margin: 0 auto; padding: 60px 24px 24px; position: relative; z-index: 1; }
    
    /* Header */
    .date { font-size: 12px; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    .greeting { font-size: 32px; font-weight: 700; margin: 0 0 32px; background: linear-gradient(135deg, #fff 0%, #a1a1aa 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    /* Stats Grid */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 16px; backdrop-filter: blur(20px); }
    .stat-label { font-size: 11px; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .stat-value { font-size: 24px; font-weight: 600; display: flex; align-items: baseline; gap: 4px; }
    .stat-unit { font-size: 12px; color: var(--accent); }

    /* Daily Focus Card */
    .focus-card { background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 24px; backdrop-filter: blur(20px); margin-bottom: 24px; position: relative; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
    .focus-card:active { transform: scale(0.98); }
    .focus-tag { font-size: 11px; font-weight: 600; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 16px; }
    .focus-word { font-family: "New York", "Playfair Display", serif; font-size: 32px; font-weight: 700; margin: 0 0 8px; }
    .focus-meaning { font-size: 15px; color: var(--text-sub); margin: 0; }
    .focus-audio { position: absolute; top: 24px; right: 24px; width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; color: var(--text-sub); }

    /* Nav Grid */
    .nav-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .nav-item { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; text-decoration: none; color: var(--text-main); display: flex; flex-direction: column; gap: 12px; transition: transform 0.2s, background 0.2s; }
    .nav-item:active { transform: scale(0.98); background: rgba(255,255,255,0.06); }
    .nav-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .nav-icon.purple { background: rgba(94, 92, 230, 0.15); color: #5e5ce6; }
    .nav-icon.green { background: rgba(48, 209, 88, 0.15); color: #30d158; }
    .nav-icon.orange { background: rgba(255, 159, 10, 0.15); color: #ff9f0a; }
    .nav-icon.pink { background: rgba(255, 55, 95, 0.15); color: #ff375f; }
    .nav-title { font-size: 16px; font-weight: 600; margin: 0; }
    .nav-sub { font-size: 12px; color: var(--text-sub); margin: 0; }

    /* Bottom Nav */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px 0 max(12px, env(safe-area-inset-bottom)); z-index: 100; }
    .nav-link { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-sub); text-decoration: none; font-size: 10px; font-weight: 500; }
    .nav-link.active { color: var(--accent); }
  </style>
</head>
<body>
  <div class="glow"></div>
  
  <div class="container">
    <div class="date" id="date-text"></div>
    <h1 class="greeting" id="greeting-text"></h1>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Streak</div>
        <div class="stat-value"><span id="stat-streak">0</span><span class="stat-unit">days</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Mastered</div>
        <div class="stat-value"><span id="stat-mastered">0</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Fuzzy</div>
        <div class="stat-value" style="color: #ffd60a"><span id="stat-fuzzy">0</span></div>
      </div>
    </div>

    <div class="focus-card" onclick="location.href='vocab.html'">
      <div class="focus-tag">Daily Focus</div>
      <h2 class="focus-word" id="focus-word"></h2>
      <p class="focus-meaning" id="focus-meaning"></p>
      <div class="focus-audio" onclick="event.stopPropagation(); playAudio(document.getElementById('focus-word').textContent)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
      </div>
    </div>

    <div class="nav-grid">
      <a href="vocab.html" class="nav-item">
        <div class="nav-icon purple"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg></div>
        <div><h3 class="nav-title">Vocabulary</h3><p class="nav-sub">Swipe & Learn</p></div>
      </a>
      <a href="quote.html" class="nav-item">
        <div class="nav-icon orange"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21v-4a4 4 0 1 1 4 4h-4z"></path><path d="M21 3v4a4 4 0 1 1-4-4h4z"></path></svg></div>
        <div><h3 class="nav-title">Quotes</h3><p class="nav-sub">Inspiration</p></div>
      </a>
      <a href="reading.html" class="nav-item">
        <div class="nav-icon green"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg></div>
        <div><h3 class="nav-title">Reading</h3><p class="nav-sub">Deep Dive</p></div>
      </a>
      <a href="notebook.html" class="nav-item">
        <div class="nav-icon pink"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg></div>
        <div><h3 class="nav-title">Notebook</h3><p class="nav-sub">Saved Items</p></div>
      </a>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-link active"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>Home</a>
    <a href="vocab.html" class="nav-link"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>Vocab</a>
    <a href="reading.html" class="nav-link"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>Read</a>
    <a href="notebook.html" class="nav-link"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>Saved</a>
  </nav>

  <script src="./js/storage.js"></script>
  <script src="./js/index.js"></script>
</body>
</html>
