<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>CET6 Immersive</title>
  
  <!-- 1. 核心设计系统 (深黑背景、毛玻璃、渐变文字全靠它) -->
  <link rel="stylesheet" href="./css/theme.css">
  <link rel="stylesheet" href="./css/animation.css">
  
  <!-- 2. 恢复 Tailwind CDN (确保所有排版和布局完美生效) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#0a0a0a',
            accent: '#5e5ce6',
            surface: '#1c1c1e'
          }
        }
      }
    }
  </script>
</head>
<body class="dark">

  <div id="app-container" class="px-6 pt-12 pb-6">
    <!-- Header -->
    <header class="mb-10">
      <p class="text-[var(--text-secondary)] text-sm font-medium tracking-wide uppercase mb-1">Good Evening</p>
      <h1 class="text-3xl font-bold text-gradient leading-tight">Ready to focus?</h1>
    </header>

    <!-- Daily Quote Preview Card -->
    <section class="glass-card p-6 mb-6 relative overflow-hidden group cursor-pointer" onclick="location.href='quote.html'">
      <div class="absolute top-0 right-0 w-32 h-32 bg-accent/10 rounded-full blur-3xl -mr-10 -mt-10 transition-all group-hover:bg-accent/20"></div>
      <span class="text-xs font-semibold text-accent tracking-widest uppercase mb-3 block">Daily Inspiration</span>
      <p class="text-xl font-light leading-relaxed mb-2 text-[var(--text-primary)]">"The only way to do great work is to love what you do."</p>
      <p class="text-sm text-[var(--text-secondary)]">— Steve Jobs</p>
    </section>

    <!-- Quick Stats Grid -->
    <div class="grid grid-cols-2 gap-4 mb-6">
      <div class="glass-card p-5 flex flex-col justify-between min-h-[120px]">
        <span class="text-[var(--text-secondary)] text-xs uppercase tracking-wider">Streak</span>
        <div class="flex items-end gap-1">
          <span class="text-3xl font-bold text-[var(--text-primary)]">12</span>
          <span class="text-sm text-accent mb-1">days</span>
        </div>
      </div>
      <div class="glass-card p-5 flex flex-col justify-between min-h-[120px]">
        <span class="text-[var(--text-secondary)] text-xs uppercase tracking-wider">Words</span>
        <div class="flex items-end gap-1">
          <span class="text-3xl font-bold text-[var(--text-primary)]">847</span>
          <span class="text-sm text-success mb-1">mastered</span>
        </div>
      </div>
    </div>

    <!-- Continue Learning Button -->
    <button class="btn-primary flex items-center justify-center gap-2 mt-4" onclick="location.href='vocab.html'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
      Continue Vocabulary
    </button>
  </div>

  <!-- Bottom Navigation (Glass) -->
  <nav class="fixed bottom-0 left-0 right-0 glass-card !rounded-none !border-t !border-x-0 !border-b-0 px-6 py-3 flex justify-around items-center z-50" style="padding-bottom: max(12px, env(safe-area-inset-bottom));">
    <a href="index.html" class="nav-item flex flex-col items-center gap-1 text-[var(--text-secondary)] transition-colors duration-200 [&.active]:text-accent">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      <span class="text-[10px] font-medium">Home</span>
    </a>
    <a href="vocab.html" class="nav-item flex flex-col items-center gap-1 text-[var(--text-secondary)] transition-colors duration-200 [&.active]:text-accent">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
      <span class="text-[10px] font-medium">Vocab</span>
    </a>
    <a href="reading.html" class="nav-item flex flex-col items-center gap-1 text-[var(--text-secondary)] transition-colors duration-200 [&.active]:text-accent">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
      <span class="text-[10px] font-medium">Read</span>
    </a>
    <a href="notebook.html" class="nav-item flex flex-col items-center gap-1 text-[var(--text-secondary)] transition-colors duration-200 [&.active]:text-accent">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
      <span class="text-[10px] font-medium">Saved</span>
    </a>
  </nav>

  <!-- Scripts -->
  <script src="./js/haptics.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/app.js"></script>
  <script src="./js/index.js"></script>
</body>
</html>
