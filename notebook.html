<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>Notebook - CET6</title>
  <link rel="stylesheet" href="./css/theme.css">
  <link rel="stylesheet" href="./css/utilities.css">
  <style>
    body { background-color: #0a0a0a; color: #f5f5f7; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", sans-serif; margin: 0; }
    .swipe-container { position: relative; overflow: hidden; border-radius: 16px; margin-bottom: 12px; }
    .swipe-content { position: relative; z-index: 2; transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); background: #1c1c1e; padding: 16px; border-radius: 16px; }
    .swipe-actions { position: absolute; top: 0; right: 0; bottom: 0; width: 80px; background: #ff3b30; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; z-index: 1; border-top-right-radius: 16px; border-bottom-right-radius: 16px; }
  </style>
</head>
<body>
  <div class="px-6 pt-12 pb-24 max-w-2xl mx-auto" style="padding-bottom: max(24px, env(safe-area-inset-bottom));">
    <header class="mb-8 flex items-center justify-between">
      <h1 class="text-2xl font-bold text-white">Notebook</h1>
      <a href="settings.html" class="w-10 h-10 flex items-center justify-center rounded-full bg-[#1c1c1e] active:scale-95 transition-transform">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </a>
    </header>

    <div id="list-words" class="space-y-3"></div>
    
    <div id="empty-state" class="hidden text-center mt-20 text-[#86868b]">
      <p class="text-4xl mb-4">📭</p>
      <p class="font-medium text-white">Your notebook is empty.</p>
      <p class="text-sm mt-1">Save words from reading or vocab to see them here.</p>
    </div>
  </div>

  <script src="./js/storage.js"></script>
  <script src="./js/app.js"></script>
  <script src="./js/notebook.js"></script>
</body>
</html>
