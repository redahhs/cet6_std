<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>Deep Read - CET6</title>
  <link rel="stylesheet" href="./css/theme.css">
  <link rel="stylesheet" href="./css/utilities.css">
  <style>
    body { background-color: #0a0a0a; color: #f5f5f7; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", sans-serif; margin: 0; }
    .article-content { font-size: 18px; line-height: 1.8; color: #d1d1d6; }
    .tap-word { cursor: pointer; transition: all 0.2s; border-radius: 4px; padding: 0 2px; margin: 0 -2px; }
    .tap-word:active { background: rgba(94, 92, 230, 0.2); color: #fff; }
    .tap-word.highlighted { background: rgba(94, 92, 230, 0.2); color: #fff; }
    
    .word-popover {
      position: absolute; z-index: 100; width: 280px;
      background: rgba(28, 28, 30, 0.85); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5); padding: 16px;
      opacity: 0; transform: translateY(10px) scale(0.95); pointer-events: none;
      transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .word-popover.active { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
    .word-popover::after {
      content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%) rotate(45deg);
      width: 12px; height: 12px; background: rgba(28, 28, 30, 0.85);
      border-right: 1px solid rgba(255, 255, 255, 0.08); border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
  </style>
</head>
<body>
  <div class="px-6 pt-12 pb-24 max-w-2xl mx-auto" style="padding-bottom: max(24px, env(safe-area-inset-bottom));">
    <header class="mb-8 flex items-center gap-4">
      <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center rounded-full bg-[#1c1c1e] active:scale-95 transition-transform">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <h1 class="text-lg font-semibold">Deep Read</h1>
    </header>

    <article id="article-view">
      <h1 id="article-title" class="text-3xl font-bold leading-tight mb-4 text-white" style="font-family: 'New York', 'Playfair Display', serif;"></h1>
      <div id="article-meta" class="text-sm text-[#86868b] mb-8"></div>
      <div id="article-content" class="article-content"></div>
    </article>
  </div>

  <div id="word-popover" class="word-popover">
    <div class="flex justify-between items-start mb-2">
      <div>
        <h3 id="pop-word" class="text-xl font-bold text-white"></h3>
        <p id="pop-phonetic" class="text-xs text-[#86868b] mt-1"></p>
      </div>
      <button id="pop-audio" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-[#5e5ce6] active:scale-90 transition-transform">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
      </button>
    </div>
    <p id="pop-meaning" class="text-sm text-[#d1d1d6] mb-3 leading-relaxed"></p>
    <button id="pop-save" class="w-full py-2 rounded-lg bg-white/5 text-xs font-medium text-[#5e5ce6] active:bg-white/10 transition-colors">Save to Notebook</button>
  </div>

  <script src="./js/storage.js"></script>
  <script src="./js/app.js"></script>
  <script src="./js/reading.js"></script>
</body>
</html>
