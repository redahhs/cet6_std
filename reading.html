<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>Read - CET6</title>
  <link rel="stylesheet" href="./css/theme.css">
  <link rel="stylesheet" href="./css/animation.css">
  <link rel="stylesheet" href="./css/utilities.css">
  <style>
    .article-content { font-size: 18px; line-height: 1.8; color: var(--text-secondary); }
    .article-content p { margin-bottom: 1.5em; }
    .tap-word { cursor: pointer; transition: color 0.2s, background 0.2s; border-radius: 4px; padding: 0 2px; margin: 0 -2px; }
    .tap-word:active { background: rgba(94, 92, 230, 0.2); color: var(--text-primary); }
    .tap-word.highlighted { background: rgba(94, 92, 230, 0.15); color: var(--text-primary); }
    
    /* Popover Tooltip */
    .word-popover {
      position: absolute;
      z-index: 100;
      width: 280px;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      padding: 16px;
      opacity: 0;
      transform: translateY(10px) scale(0.95);
      pointer-events: none;
      transition: all 0.25s var(--ease-spring);
    }
    .word-popover.active {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }
    .word-popover::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%) rotate(45deg);
      width: 12px;
      height: 12px;
      background: var(--glass-bg);
      border-right: 1px solid var(--glass-border);
      border-bottom: 1px solid var(--glass-border);
    }
  </style>
</head>
<body class="dark">

  <!-- Article View -->
  <div id="app-container" class="px-6 pt-12 pb-24 max-w-2xl mx-auto">
    <header class="mb-10 flex items-center gap-4">
      <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center rounded-full bg-[var(--bg-secondary)] active:scale-95 transition-transform">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <div class="flex-1 text-center">
        <h1 class="text-sm font-semibold text-[var(--text-secondary)]">Deep Reading</h1>
      </div>
      <div class="w-10"></div>
    </header>

    <article id="article-view" class="hidden">
      <h1 id="article-title" class="font-serif-elegant text-4xl font-bold leading-tight mb-4 text-gradient"></h1>
      <div class="flex items-center gap-3 mb-10 text-sm text-[var(--text-tertiary)]">
        <span id="article-author"></span>
        <span>·</span>
        <span id="article-date"></span>
      </div>
      <div id="article-content" class="article-content font-light"></div>
    </article>

    <!-- List View (Fallback if no article loaded) -->
    <div id="list-view" class="space-y-4">
      <h2 class="text-2xl font-bold mb-6">Today's Article</h2>
      <div id="article-list" class="space-y-4"></div>
    </div>
  </div>

  <!-- Word Popover -->
  <div id="word-popover" class="word-popover">
    <div class="flex justify-between items-start mb-3">
      <div>
        <h3 id="pop-word" class="text-xl font-bold text-[var(--text-primary)]"></h3>
        <p id="pop-phonetic" class="text-xs text-[var(--text-secondary)] mt-1"></p>
      </div>
      <button id="pop-audio" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-accent active:scale-90 transition-transform">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
      </button>
    </div>
    <p id="pop-meaning" class="text-sm text-[var(--text-secondary)] mb-4 leading-relaxed"></p>
    <button id="pop-save" class="w-full py-2 rounded-lg bg-white/5 text-xs font-medium text-accent active:bg-white/10 transition-colors">
      Save to Notebook
    </button>
  </div>

  <!-- Bottom Nav (Reused) -->
  <nav class="fixed bottom-0 left-0 right-0 glass-card !rounded-none !border-t !border-x-0 !border-b-0 px-6 py-3 flex justify-around items-center z-50" style="padding-bottom: max(12px, env(safe-area-inset-bottom));">
    <a href="index.html" class="nav-item flex flex-col items-center gap-1 text-[var(--text-secondary)]"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg><span class="text-[10px] font-medium">Home</span></a>
    <a href="vocab.html" class="nav-item flex flex-col items-center gap-1 text-[var(--text-secondary)]"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg><span class="text-[10px] font-medium">Vocab</span></a>
    <a href="reading.html" class="nav-item flex flex-col items-center gap-1 text-accent"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg><span class="text-[10px] font-medium">Read</span></a>
    <a href="notebook.html" class="nav-item flex flex-col items-center gap-1 text-[var(--text-secondary)]"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg><span class="text-[10px] font-medium">Saved</span></a>
  </nav>

  <script src="./js/storage.js"></script>
  <script src="./js/app.js"></script>
  <script src="./js/reading.js"></script>
</body>
</html>
