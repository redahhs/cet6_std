<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>Deep Read - CET6</title>
  <link rel="stylesheet" href="./css/theme.css">
  <link rel="stylesheet" href="./css/animation.css">
  <style>
    body { background: var(--bg-primary); color: var(--text-primary); }
    .article-content { color: var(--text-secondary); font-size: 18px; line-height: 1.8; }
    .tap-word { cursor: pointer; transition: all 0.2s; border-radius: 4px; padding: 0 2px; margin: 0 -2px; }
    .tap-word:active { background: rgba(94, 92, 230, 0.2); color: #fff; }
    .tap-word.highlighted { background: rgba(94, 92, 230, 0.2); color: #fff; }
    
    .word-popover {
      position: absolute; z-index: 100; width: 280px;
      background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border); border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5); padding: 16px;
      opacity: 0; transform: translateY(10px) scale(0.95); pointer-events: none;
      transition: all 0.25s var(--ease-spring);
    }
    .word-popover.active { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
  </style>
</head>
<body class="dark">
  <div class="px-6 pt-12 pb-24 max-w-2xl mx-auto">
    <header class="mb-8 flex items-center gap-4">
      <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center rounded-full bg-[var(--bg-secondary)] active:scale-95 transition-transform">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <h1 class="text-lg font-semibold">Deep Read</h1>
    </header>

    <article id="article-view">
      <h1 id="article-title" class="font-serif-elegant text-3xl font-bold leading-tight mb-4 text-white"></h1>
      <div id="article-content" class="article-content"></div>
    </article>
  </div>

  <div id="word-popover" class="word-popover">
    <div class="flex justify-between items-start mb-2">
      <h3 id="pop-word" class="text-xl font-bold text-white"></h3>
      <button id="pop-audio" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-[var(--accent)] active:scale-90 transition-transform">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
      </button>
    </div>
    <p id="pop-meaning" class="text-sm text-[var(--text-secondary)] mb-3"></p>
    <button id="pop-save" class="w-full py-2 rounded-lg bg-white/5 text-xs font-medium text-[var(--accent)] active:bg-white/10 transition-colors">Save to Notebook</button>
  </div>

  <script src="./js/storage.js"></script>
  <script src="./js/haptics.js"></script>
  <script src="./js/reading.js"></script>
</body>
</html>
