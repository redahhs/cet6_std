<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>Settings - CET6</title>
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/animation.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* iOS Style Grouped List */
    .settings-group {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-bottom: 24px;
    }
    .settings-item {
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .settings-item:last-child { border-bottom: none; }
    .settings-item:active { background: rgba(255,255,255,0.03); }
    
    /* Custom Range Slider */
    input[type="range"] {
      -webkit-appearance: none;
      width: 120px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(94, 92, 230, 0.4);
    }
  </style>
</head>
<body class="dark">

  <div id="app-container" class="px-6 pt-12 pb-24 max-w-2xl mx-auto">
    <header class="mb-8 flex items-center gap-4">
      <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center rounded-full bg-[var(--bg-secondary)] active:scale-95 transition-transform">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <h1 class="text-2xl font-bold">Settings</h1>
    </header>

    <!-- Audio Settings -->
    <h2 class="text-xs font-semibold text-[var(--text-tertiary)] uppercase tracking-wider mb-3 px-2">Audio</h2>
    <div class="settings-group">
      <div class="settings-item">
        <span class="text-[var(--text-primary)]">Speech Speed</span>
        <div class="flex items-center gap-3">
          <span id="speed-val" class="text-sm text-[var(--text-secondary)] w-8 text-right">0.9x</span>
          <input type="range" id="speed-slider" min="0.5" max="1.5" step="0.1" value="0.9">
        </div>
      </div>
    </div>

    <!-- Data Settings -->
    <h2 class="text-xs font-semibold text-[var(--text-tertiary)] uppercase tracking-wider mb-3 px-2">Data</h2>
    <div class="settings-group">
      <div class="settings-item cursor-pointer" onclick="exportData()">
        <span class="text-[var(--text-primary)]">Export Progress</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-[var(--text-tertiary)]"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </div>
      <div class="settings-item cursor-pointer" onclick="clearData()">
        <span class="text-red-500">Clear All Data</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-red-500/60"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </div>
    </div>

    <!-- About -->
    <h2 class="text-xs font-semibold text-[var(--text-tertiary)] uppercase tracking-wider mb-3 px-2">About</h2>
    <div class="settings-group">
      <div class="settings-item">
        <span class="text-[var(--text-primary)]">Version</span>
        <span class="text-[var(--text-secondary)]">1.0.0 (PWA)</span>
      </div>
      <div class="settings-item">
        <span class="text-[var(--text-primary)]">Design</span>
        <span class="text-[var(--text-secondary)]">Deep Focus System</span>
      </div>
    </div>
  </div>

  <script src="/js/storage.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/settings.js"></script>
</body>
</html>
