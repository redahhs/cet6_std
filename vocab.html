<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>Focus Mode - CET6</title>
  <link rel="stylesheet" href="./css/theme.css">
  <link rel="stylesheet" href="./css/animation.css">
  <style>
    /* Sort Control Styles */
    .sort-container {
      display: flex;
      background: var(--bg-secondary);
      padding: 4px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      margin-bottom: 24px;
    }
    .sort-btn {
      flex: 1;
      padding: 8px 0;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      border-radius: 8px;
      transition: all 0.25s var(--ease-spring);
      letter-spacing: 0.05em;
    }
    .sort-btn.active {
      background: var(--accent);
      color: white;
      box-shadow: 0 4px 12px rgba(94, 92, 230, 0.4);
    }
  </style>
</head>
<body class="dark overflow-hidden h-dvh flex flex-col">

  <header class="px-6 pt-12 pb-2 flex items-center justify-between z-10">
    <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center rounded-full bg-[var(--bg-secondary)] active:scale-95 transition-transform">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <div class="text-center">
      <h1 class="text-lg font-semibold">Focus Mode</h1>
      <p class="text-xs text-[var(--text-secondary)]" id="v-progress-text">0 / 0</p>
    </div>
    <button onclick="location.href='notebook.html'" class="w-10 h-10 flex items-center justify-center rounded-full bg-[var(--bg-secondary)] active:scale-95 transition-transform">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
    </button>
  </header>

  <!-- Sort Control -->
  <div class="px-6">
    <div class="sort-container">
      <button id="sort-default" class="sort-btn active" onclick="setSortMode('default')">DEFAULT</button>
      <button id="sort-random" class="sort-btn" onclick="setSortMode('random')">RANDOM</button>
      <button id="sort-az" class="sort-btn" onclick="setSortMode('az')">A - Z</button>
    </div>
  </div>

  <div class="px-6 mb-4">
    <div class="h-1 w-full bg-[var(--bg-secondary)] rounded-full overflow-hidden">
      <div id="v-progress-bar" class="h-full bg-[var(--accent)] rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
    </div>
  </div>

  <main class="flex-1 relative px-6 card-stack">
    <div id="v-card-container" class="absolute inset-0 mx-6"></div>
    <div id="v-empty-state" class="hidden absolute inset-0 flex flex-col items-center justify-center text-center text-[var(--text-secondary)]">
      <p class="text-5xl mb-4">🎉</p>
      <p class="font-semibold text-xl text-white">Session Complete</p>
      <p class="text-sm mt-2">Take a breath. You did great.</p>
    </div>
  </main>

  <footer class="px-6 pb-8 pt-4 flex justify-center gap-8 items-center z-10" style="padding-bottom: max(24px, env(safe-area-inset-bottom));">
    <button id="btn-forgot" class="w-16 h-16 rounded-full bg-[var(--bg-secondary)] border border-red-500/20 flex items-center justify-center text-red-500 active:scale-90 transition-transform shadow-lg shadow-red-500/5">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
    <button id="btn-fuzzy" class="w-14 h-14 rounded-full bg-[var(--bg-secondary)] border border-yellow-500/20 flex items-center justify-center text-yellow-500 active:scale-90 transition-transform shadow-lg shadow-yellow-500/5">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
    </button>
    <button id="btn-known" class="w-16 h-16 rounded-full bg-[var(--bg-secondary)] border border-green-500/20 flex items-center justify-center text-green-500 active:scale-90 transition-transform shadow-lg shadow-green-500/5">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </button>
  </footer>

  <div id="v-backdrop" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300 z-40" onclick="closeSheet()"></div>
  <div id="v-sheet" class="fixed inset-x-0 bottom-0 bg-[#1c1c1e] rounded-t-[32px] p-6 pb-8 z-50 shadow-2xl border-t border-white/5 translate-y-full transition-transform duration-400 ease-spring" style="padding-bottom: max(24px, env(safe-area-inset-bottom));">
    <div class="w-12 h-1 bg-white/20 rounded-full mx-auto mb-6"></div>
    <div id="v-sheet-content" class="max-h-[60vh] overflow-y-auto"></div>
  </div>

  <script src="./js/storage.js"></script>
  <script src="./js/haptics.js"></script>
  <script src="./js/vocab.js"></script>
</body>
</html>
