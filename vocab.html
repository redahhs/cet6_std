<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>Focus Mode - CET6</title>
  <link rel="stylesheet" href="./css/theme.css">
  <link rel="stylesheet" href="./css/animation.css">
  <style>
    /* 兜底样式：确保即使外部 CSS 加载失败，基础框架依然稳固 */
    body { background: #0a0a0a; color: #f5f5f7; font-family: -apple-system, sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .glass-card { background: rgba(28,28,30,0.65); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; }
    
    /* 排序控件样式 (Segmented Control) */
    .vocab-sort-control {
      display: flex; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; padding: 4px; margin: 0 24px 16px;
    }
    .sort-btn {
      flex: 1; padding: 8px 0; font-size: 13px; font-weight: 600; color: #86868b;
      border: none; background: transparent; border-radius: 8px; cursor: pointer; transition: all 0.2s ease;
    }
    .sort-btn.active { background: #5e5ce6; color: #fff; box-shadow: 0 4px 12px rgba(94,92,230,0.3); }
  </style>
</head>
<body>
  <header style="padding: 60px 24px 16px; display: flex; justify-content: space-between; align-items: center;">
    <button onclick="history.back()" style="width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.05);border:none;color:#fff;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <div style="text-align:center;">
      <h1 style="font-size:18px;margin:0;">Focus Mode</h1>
      <p id="vocab-progress-text" style="font-size:12px;color:#86868b;margin:4px 0 0;">0 / 0</p>
    </div>
    <button onclick="location.href='./notebook.html'" style="width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.05);border:none;color:#fff;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
    </button>
  </header>

  <!-- 🌟 新增：排序控件 -->
  <div class="vocab-sort-control">
    <button class="sort-btn active" data-sort="default">Default</button>
    <button class="sort-btn" data-sort="random">Random</button>
    <button class="sort-btn" data-sort="az">A - Z</button>
  </div>

  <div style="padding: 0 24px 16px;">
    <div style="height:4px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;">
      <div id="vocab-progress-bar" style="height:100%;background:#5e5ce6;width:0%;transition:width 0.4s;"></div>
    </div>
  </div>

  <main style="flex:1;position:relative;padding:0 24px;" id="vocab-main">
    <div id="vocab-card-container" style="position:absolute;inset:0;"></div>
    <div id="vocab-empty-state" style="display:none;text-align:center;color:#86868b;">
      <p style="font-size:48px;margin-bottom:16px;">🎉</p>
      <p style="font-size:20px;color:#fff;">Session Complete</p>
      <p>Take a breath. You did great.</p>
    </div>
  </main>

  <footer style="padding: 16px 24px 32px; display: flex; justify-content: center; gap: 32px;">
    <button id="vocab-btn-forgot" style="width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,0.05);border:1px solid rgba(239,68,68,0.2);color:#ef4444;">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
    <button id="vocab-btn-fuzzy" style="width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,0.05);border:1px solid rgba(234,179,8,0.2);color:#eab308;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
    </button>
    <button id="vocab-btn-known" style="width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,0.05);border:1px solid rgba(34,197,94,0.2);color:#22c55e;">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </button>
  </footer>

  <div id="v-backdrop" style="position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:40;opacity:0;pointer-events:none;transition:opacity 0.3s;" onclick="window.closeSheet()"></div>
  <div id="v-sheet" style="position:fixed;left:0;right:0;bottom:0;background:#1c1c1e;border-top:1px solid rgba(255,255,255,0.08);border-radius:24px 24px 0 0;padding:24px;z-index:50;transform:translateY(100%);transition:transform 0.4s cubic-bezier(0.25,1,0.5,1);max-height:70vh;overflow-y:auto;padding-bottom:max(24px, env(safe-area-inset-bottom));">
    <div style="width:48px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin:0 auto 24px;cursor:pointer;" onclick="window.closeSheet()"></div>
    <div id="v-sheet-content"></div>
  </div>

  <script src="./js/storage.js"></script>
  <script src="./js/vocab.js"></script>
</body>
</html>
