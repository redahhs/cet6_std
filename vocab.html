<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>Focus Mode - CET6</title>
  <link rel="stylesheet" href="./css/theme.css">
  <link rel="stylesheet" href="./css/animation.css">
  <style>
    /* 针对 vocab 页面的特定样式，确保万无一失 */
    body {
      background-color: #0a0a0a !important;
      color: #f5f5f7;
      margin: 0;
      padding: 0;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "PingFang SC", sans-serif;
    }
    .v-header {
      padding: 60px 24px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }
    .v-btn-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f5f5f7;
      border: none;
      cursor: pointer;
    }
    .v-progress-bar {
      height: 4px;
      background: rgba(255,255,255,0.05);
      border-radius: 2px;
      overflow: hidden;
      margin: 0 24px 24px;
    }
    .v-progress-fill {
      height: 100%;
      background: #5e5ce6;
      border-radius: 2px;
      transition: width 0.4s ease;
    }
    .v-card-area {
      flex: 1;
      position: relative;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .v-card {
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      text-align: center;
      touch-action: none;
      user-select: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .v-actions {
      padding: 24px;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      display: flex;
      justify-content: center;
      gap: 32px;
      align-items: center;
      z-index: 10;
    }
    .v-action-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
      transition: transform 0.2s;
    }
    .v-action-btn:active { transform: scale(0.9); }
    .v-action-btn.forgot { color: #ff453a; border-color: rgba(255,69,58,0.3); }
    .v-action-btn.fuzzy { color: #ffd60a; border-color: rgba(255,214,10,0.3); }
    .v-action-btn.known { color: #30d158; border-color: rgba(48,209,88,0.3); }
    
    /* Bottom Sheet */
    .v-sheet {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      background: #1c1c1e;
      border-top: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px 24px 0 0;
      padding: 24px;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      z-index: 100;
      max-height: 70vh;
      overflow-y: auto;
    }
    .v-sheet.open { transform: translateY(0); }
    .v-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 90;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .v-backdrop.open { opacity: 1; pointer-events: auto; }
    
    .v-loading { color: #86868b; font-size: 14px; }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="v-header">
    <button class="v-btn-icon" onclick="history.back()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <div style="text-align: center;">
      <div style="font-size: 16px; font-weight: 600;">Focus Mode</div>
      <div id="v-progress-text" style="font-size: 12px; color: #86868b; margin-top: 2px;">0 / 0</div>
    </div>
    <button class="v-btn-icon" onclick="location.href='./notebook.html'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
    </button>
  </header>

  <!-- Progress -->
  <div class="v-progress-bar">
    <div id="v-progress-fill" class="v-progress-fill" style="width: 0%"></div>
  </div>

  <!-- Card Area -->
  <main class="v-card-area" id="v-card-area">
    <div id="v-loading" class="v-loading">Loading words...</div>
    <div id="v-empty" style="display: none; text-align: center; color: #86868b;">
      <div style="font-size: 48px; margin-bottom: 16px;">🎉</div>
      <div style="font-size: 20px; font-weight: 600; color: #f5f5f7;">Session Complete</div>
      <div style="font-size: 14px; margin-top: 8px;">Take a breath. You did great.</div>
    </div>
  </main>

  <!-- Actions -->
  <footer class="v-actions">
    <button id="btn-forgot" class="v-action-btn forgot">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
    <button id="btn-fuzzy" class="v-action-btn fuzzy">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
    </button>
    <button id="btn-known" class="v-action-btn known">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </button>
  </footer>

  <!-- Bottom Sheet -->
  <div id="v-backdrop" class="v-backdrop" onclick="closeSheet()"></div>
  <div id="v-sheet" class="v-sheet">
    <div style="width: 48px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 0 auto 24px;"></div>
    <div id="v-sheet-content"></div>
  </div>

  <script src="./js/storage.js"></script>
  <script src="./js/app.js"></script>
  <script src="./js/vocab.js"></script>
</body>
</html>
