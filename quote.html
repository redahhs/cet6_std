<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>Daily Quote</title>
  <link rel="stylesheet" href="./css/theme.css">
  <link rel="stylesheet" href="./css/utilities.css">
  <style>
    body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; }
    
    /* 背景图层：缓慢放大动效 (Ken Burns) */
    .quote-bg {
      position: fixed; inset: 0; z-index: 0;
      background-size: cover; background-position: center;
      transition: transform 15s ease-out, opacity 1s ease;
      transform: scale(1.0);
    }
    .quote-bg.zoomed { transform: scale(1.15); }
    
    /* 渐变遮罩：确保文字在任何背景上都清晰可读 */
    .quote-overlay {
      position: fixed; inset: 0; z-index: 1;
      background: linear-gradient(to bottom, 
        rgba(0,0,0,0.5) 0%, 
        rgba(0,0,0,0.1) 30%, 
        rgba(0,0,0,0.5) 70%, 
        rgba(0,0,0,0.9) 100%);
      pointer-events: none;
    }

    /* 内容层 */
    .quote-content {
      position: relative; z-index: 10;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      padding: 60px 24px 0;
      box-sizing: border-box;
    }

    .quote-tag {
      font-size: 11px; font-weight: 600; letter-spacing: 0.15em;
      color: rgba(255,255,255,0.5); text-transform: uppercase;
    }

    /* 核心文字区 */
    .quote-text-area {
      flex: 1; display: flex; flex-direction: column; justify-content: center;
      max-width: 600px; margin: 0 auto; width: 100%;
    }
    .quote-en {
      font-family: "New York", "Playfair Display", "Noto Serif SC", serif;
      font-size: clamp(26px, 7vw, 40px);
      font-weight: 500; line-height: 1.35;
      color: #fff;
      text-shadow: 0 2px 20px rgba(0,0,0,0.6);
      margin-bottom: 24px;
    }
    .quote-zh {
      font-size: 16px; line-height: 1.6;
      color: rgba(255,255,255,0.7);
      margin-bottom: 16px;
    }
    .quote-author {
      font-size: 14px; color: rgba(255,255,255,0.4);
      font-style: italic;
    }

    /* 底部毛玻璃操作栏 */
    .quote-actions {
      display: flex; justify-content: center; gap: 40px;
      padding: 24px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px 28px 0 0;
      margin: 0 -24px 0;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
    }
    .action-btn {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      color: rgba(255,255,255,0.7); background: none; border: none;
      font-size: 11px; font-weight: 500;
      transition: transform 0.2s;
    }
    .action-btn:active { transform: scale(0.9); }
    .action-icon {
      width: 52px; height: 52px; border-radius: 50%;
      background: rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s;
    }
    .action-btn.saved .action-icon { 
      background: var(--accent); 
      color: #fff; 
      box-shadow: 0 4px 15px rgba(94, 92, 230, 0.4);
    }
  </style>
</head>
<body>
  <!-- 背景 -->
  <div class="quote-bg" id="quoteBg"></div>
  <div class="quote-overlay"></div>

  <!-- 内容 -->
  <div class="quote-content" id="quoteContent">
    <div class="quote-tag" id="quoteDate">Daily Inspiration</div>
    
    <div class="quote-text-area" id="quoteTextArea">
      <p class="quote-en" id="quoteEn">"Loading..."</p>
      <p class="quote-zh" id="quoteZh">Loading...</p>
      <p class="quote-author" id="quoteAuthor">—</p>
    </div>

    <!-- 底部操作栏 -->
    <div class="quote-actions">
      <button class="action-btn" id="btnPlay" onclick="playQuote()">
        <div class="action-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        </div>
        <span>Listen</span>
      </button>
      <button class="action-btn" id="btnSave" onclick="toggleSave()">
        <div class="action-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
        </div>
        <span id="saveText">Save</span>
      </button>
      <button class="action-btn" onclick="nextQuote()">
        <div class="action-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </div>
        <span>Next</span>
      </button>
    </div>
  </div>

  <script src="./js/storage.js"></script>
  <script src="./js/app.js"></script>
  <script src="./js/quote.js"></script>
</body>
</html>
